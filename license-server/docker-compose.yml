version: "3.8"

services:
  license-server:
    build: .
    container_name: eventhunt-license-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3000"
    volumes:
      - ./data:/app/data
      - ./releases:/app/releases
      - ./public:/app/public
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/licenses.db
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH:?ADMIN_PASSWORD_HASH is required}
      - LICENSE_PRIVATE_KEY_BASE64=${LICENSE_PRIVATE_KEY_BASE64:?LICENSE_PRIVATE_KEY_BASE64 is required}
      - SMTP_HOST=${SMTP_HOST:-smtp.spaceweb.ru}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER:?SMTP_USER is required}
      - SMTP_PASS=${SMTP_PASS:?SMTP_PASS is required}
      - SMTP_FROM=${SMTP_FROM:-soft@eventhunt.ru}
