name: Test Windows Runner Network

on:
  workflow_dispatch:
  push:
    tags:
      - 'test-network-*'

jobs:
  network-check:
    runs-on: [self-hosted, Windows]
    steps:
      - name: Show hosts file
        shell: cmd
        run: type C:\Windows\System32\drivers\etc\hosts

      - name: DNS lookup github.com
        shell: cmd
        run: nslookup github.com

      - name: DNS lookup api.github.com
        shell: cmd
        run: nslookup api.github.com

      - name: Ping github.com
        shell: cmd
        run: ping -n 4 github.com

      - name: HEAD github.com release url
        shell: cmd
        run: curl -I --max-time 30 "https://github.com/tauri-apps/binary-releases/releases/download/nsis-3.11/nsis-3.11.zip"

      - name: HEAD api.github.com
        shell: cmd
        run: curl -I --max-time 30 "https://api.github.com/"

      - name: Test direct SourceForge NSIS download
        shell: cmd
        run: curl -L --max-time 60 -o "%TEMP%\nsis-test.zip" "https://sourceforge.net/projects/nsis/files/NSIS%%203/3.11/nsis-3.11.zip/download" && dir "%TEMP%\nsis-test.zip"
