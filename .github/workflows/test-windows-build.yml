name: Test Windows Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'test-windows-*'

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  build-windows:
    runs-on: [self-hosted, Windows]
    defaults:
      run:
        working-directory: apps/musicbingo
        shell: cmd
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Rust default toolchain
        run: rustup default stable

      - name: Pre-download NSIS tools into Tauri cache
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $cache = "C:\Windows\system32\config\systemprofile\AppData\Local\tauri"
          $nsisDir = "$cache\NSIS"
          $toolsUrl = "https://soft.eventhunt.ru/releases/nsis-tools"

          if (Test-Path $nsisDir) { Remove-Item -Recurse -Force $nsisDir }
          New-Item -ItemType Directory -Force -Path $nsisDir | Out-Null

          # NSIS 3.11
          Invoke-WebRequest -Uri "$toolsUrl/nsis-3.11.zip" -OutFile "$nsisDir\nsis-3.11.zip" -MaximumRedirection 5
          Expand-Archive -Path "$nsisDir\nsis-3.11.zip" -DestinationPath "$nsisDir" -Force
          Get-ChildItem -Path "$nsisDir\nsis-3.11\*" -Recurse | Move-Item -Destination "$nsisDir" -Force -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$nsisDir\nsis-3.11" -ErrorAction SilentlyContinue
          Remove-Item "$nsisDir\nsis-3.11.zip" -ErrorAction SilentlyContinue

          # NSIS ApplicationID plugin
          Invoke-WebRequest -Uri "$toolsUrl/NSIS-ApplicationID.zip" -OutFile "$nsisDir\NSIS-ApplicationID.zip" -MaximumRedirection 5
          Expand-Archive -Path "$nsisDir\NSIS-ApplicationID.zip" -DestinationPath "$nsisDir" -Force
          New-Item -ItemType Directory -Force -Path "$nsisDir\Plugins\x86-unicode" | Out-Null
          Copy-Item "$nsisDir\ReleaseUnicode\ApplicationID.dll" "$nsisDir\Plugins\x86-unicode\ApplicationID.dll" -Force
          Remove-Item -Recurse -Force "$nsisDir\Debug" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$nsisDir\DebugUnicode" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$nsisDir\Release" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$nsisDir\ReleaseUnicode" -ErrorAction SilentlyContinue
          Remove-Item "$nsisDir\NSIS-ApplicationID.zip" -ErrorAction SilentlyContinue

          # nsis_tauri_utils plugin
          Invoke-WebRequest -Uri "$toolsUrl/nsis_tauri_utils.dll" -OutFile "$nsisDir\nsis_tauri_utils.dll" -MaximumRedirection 5
          Copy-Item "$nsisDir\nsis_tauri_utils.dll" "$nsisDir\Plugins\x86-unicode\nsis_tauri_utils.dll" -Force
          New-Item -ItemType Directory -Force -Path "$nsisDir\Plugins\x86-unicode\additional" | Out-Null
          Copy-Item "$nsisDir\nsis_tauri_utils.dll" "$nsisDir\Plugins\x86-unicode\additional\nsis_tauri_utils.dll" -Force

          Write-Host "NSIS cache prepared at $nsisDir"
          Get-ChildItem $nsisDir -Recurse | Select-Object -First 20

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Build Windows bundle
        run: npm run tauri:build -- --target x86_64-pc-windows-msvc --bundles nsis

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: musicbingo-windows-x64-test
          path: |
            apps/musicbingo/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
