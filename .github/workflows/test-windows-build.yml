name: Test Windows Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'test-windows-*'

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  build-windows:
    runs-on: [self-hosted, Windows]
    defaults:
      run:
        working-directory: apps/musicbingo
        shell: cmd
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Rust default toolchain
        run: rustup default stable

      - name: Pre-download NSIS
        shell: cmd
        run: |
          mkdir "C:\Windows\system32\config\systemprofile\AppData\Local\tauri\NSIS" 2>nul
          curl -L --max-time 300 -o "C:\Windows\system32\config\systemprofile\AppData\Local\tauri\NSIS\nsis-3.11.zip" "https://sourceforge.net/projects/nsis/files/NSIS%%203/3.11/nsis-3.11.zip/download"
          cd "C:\Windows\system32\config\systemprofile\AppData\Local\tauri\NSIS"
          tar -xf nsis-3.11.zip

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Build Windows bundle
        run: npm run tauri:build -- --target x86_64-pc-windows-msvc --bundles nsis

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: musicbingo-windows-x64-test
          path: |
            apps/musicbingo/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
