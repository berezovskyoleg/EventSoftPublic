name: Build Tauri apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

defaults:
  run:
    working-directory: apps/toastmachine

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/toastmachine/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci

      - name: Build universal admin CLI
        run: |
          rustup target add x86_64-apple-darwin aarch64-apple-darwin
          cargo build --release --manifest-path src-tauri/Cargo.toml --bin admin --target x86_64-apple-darwin
          cargo build --release --manifest-path src-tauri/Cargo.toml --bin admin --target aarch64-apple-darwin
          mkdir -p src-tauri/target/universal-apple-darwin/release
          lipo -create \
            src-tauri/target/x86_64-apple-darwin/release/admin \
            src-tauri/target/aarch64-apple-darwin/release/admin \
            -output src-tauri/target/universal-apple-darwin/release/admin

      - name: Build macOS universal bundle
        run: npm run tauri:build -- --target universal-apple-darwin

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: toastmachine-macos-universal
          path: |
            apps/toastmachine/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            apps/toastmachine/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/toastmachine/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Windows x64 bundle
        run: npm run tauri:build -- --target x86_64-pc-windows-msvc

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: toastmachine-windows-x64
          path: |
            apps/toastmachine/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            apps/toastmachine/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
