name: Release MusicBingo Builds

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to create (e.g. musicbingo-v0.1.0)'
        required: true
        default: 'musicbingo-v0.1.0'
  push:
    tags:
      - 'musicbingo-v*'

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/musicbingo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Build macOS universal bundle
        run: npm run tauri:build -- --target universal-apple-darwin

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: musicbingo-macos-universal
          path: |
            apps/musicbingo/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            apps/musicbingo/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/musicbingo
        shell: cmd
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Rust default toolchain
        run: rustup default stable

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Build Windows bundle
        run: npm run tauri:build -- --target x86_64-pc-windows-msvc

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: musicbingo-windows-x64
          path: |
            apps/musicbingo/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            apps/musicbingo/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/musicbingo-v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -R artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: MusicBingo ${{ github.event.inputs.version || github.ref_name }}
          files: artifacts/**/*
          generate_release_notes: true

  deploy-site:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/musicbingo-v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EVENTHUNT_SSH_KEY }}

      - name: Create server dirs
        run: ssh -o StrictHostKeyChecking=no root@soft.eventhunt.ru 'mkdir -p /opt/eventhunt-license-server/public/musicbingo /opt/eventhunt-license-server/releases'

      - name: Upload landing page
        run: scp -o StrictHostKeyChecking=no -r apps/musicbingo/public/musicbingo root@soft.eventhunt.ru:/opt/eventhunt-license-server/public/

      - name: Restart license server
        run: ssh -o StrictHostKeyChecking=no root@soft.eventhunt.ru 'cd /opt/eventhunt-license-server && docker-compose restart || true'
